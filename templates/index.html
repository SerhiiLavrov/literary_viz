<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literary Viz</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <h1>Literary Text Visualizer</h1>
                    <p>Upload a book in PDF format and get AI-powered visualizations</p>
                </div>
                <button onclick="showLibrary()" style="
                    background:#1e1e35; border:1px solid #2a2a45; color:#a78bfa;
                    padding:10px 20px; border-radius:10px; cursor:pointer;
                    font-size:14px; transition:all 0.2s;">
                    📚 Library
                </button>
            </div>
        </header>

        <!-- Library modal -->
        <div id="libraryModal" style="display:none; position:fixed; top:0; left:0;
            width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000;
            overflow-y:auto;">
            <div style="max-width:800px; margin:40px auto; background:#16162a;
                border-radius:16px; padding:32px; border:1px solid #2a2a45;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                    <h2 style="color:#e0e0e0; margin:0;">Library</h2>
                    <button onclick="closeLibrary()" style="background:none; border:none;
                        color:#666; font-size:24px; cursor:pointer;">×</button>
                </div>
                <div style="display:flex; gap:8px; margin-bottom:24px;">
                    <input id="librarySearch" type="text" placeholder="Search by title or author..."
                        oninput="searchLibrary()"
                        style="flex:1; background:#0f0f1a; border:1px solid #333;
                        border-radius:8px; padding:10px 14px; color:#e0e0e0; font-size:14px;">
                </div>
                <div id="libraryList"></div>
            </div>
        </div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📄</div>
            <p>Drag & drop your PDF here</p>
            <p>or</p>
            <label class="upload-btn">
                Choose File
                <input type="file" id="fileInput" accept=".pdf" hidden>
            </label>
        </div>

        <div class="results" id="results" style="display:none;">
            <h2>Analysis Results</h2>
            <div class="tabs">
                <button class="tab active" data-tab="emotion">Emotion</button>
                <button class="tab" data-tab="tension">Tension</button>
                <button class="tab" data-tab="characters">Characters</button>
                <button class="tab" data-tab="rhythm">Rhythm</button>
                <button class="tab" data-tab="punctuation">Punctuation</button>
                <button class="tab" data-tab="map">Locations</button>
            </div>
            <div class="tab-content" id="tabContent"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
